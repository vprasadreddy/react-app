name: GitHub OIDC Authentication with GCP Cloud Run Deployment

on:
    # push:
    #     branches: [main]

    workflow_dispatch:

env:
    PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
    REGION: ${{ secrets.GCP_REGION }}
    CLOUD_RUN_SERVICE_NAME: ${{ secrets.GCP_CLOUD_RUN_SERVICE_NAME }}
    IMAGE_NAME: ${{ secrets.GCP_IMAGE_NAME }}
    IMAGE_TAG: ${{ github.sha }}
    ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}

# Required for OIDC token generation
permissions:
    contents: read
    id-token: write

jobs:
    docker-build-and-push:
        # runs-on: debian-self-hosted-runner
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            # Authenticate to GCP using Workload Identity Federation
            - name: Authenticate to Google Cloud
              id: auth
              uses: google-github-actions/auth@v3
              with:
                  token_format: "access_token"
                  workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

            - name: Set up Cloud SDK
              uses: google-github-actions/setup-gcloud@v3

            - name: Docker Auth
              id: docker-auth
              uses: "docker/login-action@v1"
              with:
                  username: "oauth2accesstoken"
                  password: "${{ steps.auth.outputs.access_token }}"
                  registry: "${{ env.REGION }}-docker.pkg.dev"

            - name: Print GitHub SHA value
              run: |
                  echo "Image tag: ${{ env.IMAGE_TAG }}"

            - name: Build, tag and push container
              id: build-image
              uses: docker/build-push-action@v3
              with:
                  #   context: ${{ vars.code_directory }}
                  push: true
                  tags: |
                      ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.CLOUD_RUN_SERVICE_NAME }}:${{ env.IMAGE_TAG }}

            # - name: Deploy to Cloud Run
            #   id: "deploy"
            #   uses: "google-github-actions/deploy-cloudrun@v3"
            #   with:
            #       service: "hello-cloud-run"
            #       image: "us-docker.pkg.dev/cloudrun/container/hello:latest"

            # - name: "Use output"
            #   run: 'curl "${{ steps.deploy.outputs.url }}"'

            - name: Deploy to Cloud Run
              run: |
                  gcloud run deploy ${{ env.CLOUD_RUN_SERVICE_NAME }} \
                  --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.ARTIFACT_REPO }}/${{ env.CLOUD_RUN_SERVICE_NAME }}:${{ env.IMAGE_TAG }} \
                  --region ${{ env.REGION }} \
                  --platform managed \
                  --allow-unauthenticated \
                  --set-env-vars "REACT_APP_ENVIRONMENT=Development"
